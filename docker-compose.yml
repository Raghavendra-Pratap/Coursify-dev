# Coursify Next.js app — use with self-hosted Supabase (see docs/SELF_HOSTED_DOCKER.md)
#
# IMPORTANT: docker compose only reads .env by default — NOT .env.production.
# Use ./docker/build-app.sh (wraps --env-file .env.production) so NEXT_PUBLIC_*
# vars are available at build time (required for next build).
#
#   ./docker/build-app.sh

services:
  coursify:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
        NEXT_PUBLIC_ASSESSMENT_PRO_ORIGIN: ${NEXT_PUBLIC_ASSESSMENT_PRO_ORIGIN:-}
    image: coursify-lms:latest
    container_name: coursify
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Explicit passthrough so server secrets from .env.production reach Node at runtime
      # (compose --env-file .env.production supplies values for ${...} below).
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
