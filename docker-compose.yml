# Coursify Next.js app — use with self-hosted Supabase (see docs/SELF_HOSTED_DOCKER.md)
#
# Local (after ./docker/setup-supabase.sh):
#   cp .env.selfhosted.example .env.production
#   docker compose up -d --build
#
# Production VPS: same file, .env.production with public HTTPS URLs

services:
  coursify:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
        NEXT_PUBLIC_ASSESSMENT_PRO_ORIGIN: ${NEXT_PUBLIC_ASSESSMENT_PRO_ORIGIN:-}
    image: coursify-lms:latest
    container_name: coursify
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
