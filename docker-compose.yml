# Coursify on your VPS — app only (Supabase Auth + DB stay hosted on Supabase)
#
# 1. cp .env.production.example .env.production  and fill values
# 2. docker compose up -d --build
# 3. Point nginx/Caddy at localhost:3000 (see docs/VPS_DOCKER_DEPLOY.md)

services:
  coursify:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_ASSESSMENT_PRO_ORIGIN: ${NEXT_PUBLIC_ASSESSMENT_PRO_ORIGIN:-}
    image: coursify-lms:latest
    container_name: coursify
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
