# Coursify Next.js app — use with self-hosted Supabase (see docs/SELF_HOSTED_DOCKER.md)
#
# IMPORTANT: docker compose only reads .env by default — NOT .env.production.
# Use ./docker/build-app.sh (wraps --env-file .env.production) so NEXT_PUBLIC_*
# vars are available at build time (required for next build).
#
#   ./docker/build-app.sh

services:
  coursify:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
        NEXT_PUBLIC_ASSESSMENT_PRO_ORIGIN: ${NEXT_PUBLIC_ASSESSMENT_PRO_ORIGIN:-}
    image: coursify-lms:latest
    container_name: coursify
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    volumes:
      # Coursify container only — server secrets read at runtime (Next.js trims process.env).
      - ./.env.production:/app/config/production.env:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
